<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="chartGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="chartGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Shadows -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadowLarge" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Avatar clip paths -->
    <clipPath id="avatarClip1">
      <circle cx="0" cy="0" r="25"/>
    </clipPath>
    <clipPath id="avatarClip2">
      <circle cx="0" cy="0" r="25"/>
    </clipPath>
    <clipPath id="avatarClip3">
      <circle cx="0" cy="0" r="25"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Decorative background elements -->
  <circle cx="100" cy="100" r="60" fill="#3b82f6" opacity="0.05"/>
  <circle cx="1100" cy="700" r="80" fill="#1e40af" opacity="0.05"/>
  <circle cx="950" cy="150" r="40" fill="#3b82f6" opacity="0.08"/>
  <circle cx="150" cy="650" r="50" fill="#1e40af" opacity="0.06"/>
  
  <!-- Main Dashboard/Computer Screen -->
  <g transform="translate(350, 120)" filter="url(#shadowLarge)">
    <!-- Monitor stand -->
    <rect x="220" y="420" width="60" height="80" fill="#475569"/>
    <rect x="180" y="500" width="140" height="15" rx="3" fill="#334155"/>
    
    <!-- Monitor frame -->
    <rect x="0" y="0" width="500" height="420" rx="12" fill="#1e293b"/>
    <rect x="8" y="8" width="484" height="404" rx="8" fill="url(#screenGradient)"/>
    
    <!-- Screen content - Header -->
    <rect x="20" y="20" width="460" height="50" rx="6" fill="#f1f5f9"/>
    <circle cx="45" cy="45" r="12" fill="url(#primaryGradient)"/>
    <circle cx="45" cy="45" r="6" fill="#ffffff"/>
    <rect x="75" y="35" width="120" height="8" rx="4" fill="#3b82f6"/>
    <rect x="75" y="48" width="80" height="5" rx="2.5" fill="#94a3b8"/>
    
    <!-- Screen content - Sidebar icons -->
    <g transform="translate(20, 85)">
      <rect x="0" y="0" width="60" height="280" rx="6" fill="#f8fafc"/>
      <!-- Icon 1 - Users -->
      <circle cx="30" cy="35" r="12" fill="#dbeafe"/>
      <circle cx="30" cy="32" r="5" fill="#3b82f6"/>
      <path d="M 20 45 Q 30 50 40 45" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Icon 2 - Documents -->
      <rect x="22" y="70" width="16" height="20" rx="2" fill="#dbeafe"/>
      <rect x="25" y="75" width="10" height="2" fill="#3b82f6"/>
      <rect x="25" y="80" width="10" height="2" fill="#3b82f6"/>
      <rect x="25" y="85" width="6" height="2" fill="#3b82f6"/>
      <!-- Icon 3 - Analytics -->
      <rect x="22" y="110" width="16" height="20" rx="2" fill="#dbeafe"/>
      <rect x="24" y="120" width="4" height="8" fill="#3b82f6"/>
      <rect x="30" y="115" width="4" height="13" fill="#3b82f6"/>
      <rect x="36" y="110" width="4" height="18" fill="#3b82f6"/>
      <!-- Icon 4 - Settings -->
      <circle cx="30" cy="165" r="10" fill="#dbeafe"/>
      <circle cx="30" cy="165" r="4" fill="#3b82f6"/>
      <path d="M 30 150 L 30 155 M 30 175 L 30 180 M 15 165 L 20 165 M 40 165 L 45 165" stroke="#3b82f6" stroke-width="2"/>
    </g>
    
    <!-- Screen content - Main area with charts -->
    <g transform="translate(95, 85)">
      <!-- Card 1 - Employee Stats -->
      <rect x="0" y="0" width="180" height="100" rx="8" fill="#ffffff" filter="url(#shadow)"/>
      <rect x="15" y="15" width="60" height="8" rx="4" fill="#64748b"/>
      <circle cx="140" cy="25" r="15" fill="#dbeafe"/>
      <path d="M 140 18 L 140 32 M 133 25 L 147 25" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
      <text x="25" y="60" font-family="Arial" font-size="28" font-weight="bold" fill="#1e40af">248</text>
      <text x="25" y="80" font-family="Arial" font-size="12" fill="#64748b">Total Employees</text>
      
      <!-- Card 2 - Department Chart -->
      <rect x="200" y="0" width="180" height="100" rx="8" fill="#ffffff" filter="url(#shadow)"/>
      <rect x="215" y="15" width="70" height="8" rx="4" fill="#64748b"/>
      <g transform="translate(320, 50)">
        <rect x="-15" y="-20" width="10" height="20" fill="url(#chartGradient1)"/>
        <rect x="-2" y="-30" width="10" height="30" fill="url(#chartGradient2)"/>
        <rect x="11" y="-15" width="10" height="15" fill="url(#chartGradient3)"/>
      </g>
      
      <!-- Card 3 - Performance Graph -->
      <rect x="0" y="115" width="380" height="130" rx="8" fill="#ffffff" filter="url(#shadow)"/>
      <rect x="20" y="25" width="80" height="8" rx="4" fill="#64748b"/>
      <!-- Graph line -->
      <path d="M 20 90 L 70 75 L 120 85 L 170 55 L 220 65 L 270 40 L 320 50 L 360 30" 
            stroke="url(#accentGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="70" cy="75" r="4" fill="#3b82f6"/>
      <circle cx="170" cy="55" r="4" fill="#3b82f6"/>
      <circle cx="270" cy="40" r="4" fill="#3b82f6"/>
      <circle cx="360" cy="30" r="4" fill="#3b82f6"/>
      <!-- Grid lines -->
      <line x1="20" y1="60" x2="360" y2="60" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="20" y1="90" x2="360" y2="90" stroke="#e2e8f0" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Character 1 - Business woman (left side) -->
  <g transform="translate(120, 420)">
    <!-- Body -->
    <ellipse cx="60" cy="180" rx="50" ry="70" fill="#1e40af"/>
    <!-- Suit jacket details -->
    <path d="M 35 140 L 60 180 L 85 140" fill="#3b82f6" opacity="0.3"/>
    <!-- Head -->
    <circle cx="60" cy="100" r="35" fill="#fcd9b5"/>
    <!-- Hair -->
    <path d="M 30 90 Q 25 70 40 55 Q 60 45 80 55 Q 95 70 90 90 Q 85 110 60 105 Q 35 110 30 90" fill="#4a3728"/>
    <!-- Face features -->
    <circle cx="50" cy="95" r="3" fill="#4a3728"/>
    <circle cx="70" cy="95" r="3" fill="#4a3728"/>
    <path d="M 55 110 Q 60 115 65 110" stroke="#d48876" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Arm holding tablet -->
    <path d="M 85 160 Q 110 170 120 190" stroke="#fcd9b5" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Tablet -->
    <rect x="115" y="170" width="50" height="70" rx="6" fill="#1e293b"/>
    <rect x="120" y="175" width="40" height="60" rx="3" fill="#3b82f6"/>
    <rect x="125" y="182" width="30" height="4" rx="2" fill="#ffffff" opacity="0.8"/>
    <rect x="125" y="190" width="25" height="4" rx="2" fill="#ffffff" opacity="0.8"/>
    <rect x="125" y="198" width="28" height="4" rx="2" fill="#ffffff" opacity="0.8"/>
    <rect x="125" y="206" width="20" height="4" rx="2" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Character 2 - Business man (right side) -->
  <g transform="translate(1020, 420)">
    <!-- Body -->
    <ellipse cx="60" cy="180" rx="55" ry="75" fill="#1e40af"/>
    <!-- Suit jacket details -->
    <path d="M 30 140 L 60 180 L 90 140" fill="#3b82f6" opacity="0.3"/>
    <!-- Shirt collar -->
    <path d="M 45 135 L 60 160 L 75 135" fill="#ffffff"/>
    <!-- Head -->
    <circle cx="60" cy="95" r="38" fill="#8d6e5a"/>
    <!-- Hair -->
    <path d="M 28 85 Q 25 65 35 50 Q 60 40 85 50 Q 95 65 92 85 Q 88 100 60 95 Q 32 100 28 85" fill="#2d2d2d"/>
    <!-- Glasses -->
    <circle cx="50" cy="92" r="8" fill="none" stroke="#475569" stroke-width="2"/>
    <circle cx="70" cy="92" r="8" fill="none" stroke="#475569" stroke-width="2"/>
    <line x1="58" y1="92" x2="62" y2="92" stroke="#475569" stroke-width="2"/>
    <!-- Face features -->
    <circle cx="50" cy="92" r="2.5" fill="#2d2d2d"/>
    <circle cx="70" cy="92" r="2.5" fill="#2d2d2d"/>
    <path d="M 55 112 Q 60 117 65 112" stroke="#6d5344" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Arm holding document -->
    <path d="M 35 165 Q 15 175 5 195" stroke="#8d6e5a" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Document/Clipboard -->
    <rect x="-15" y="175" width="45" height="60" rx="4" fill="#ffffff"/>
    <rect x="-10" y="182" width="35" height="4" rx="2" fill="#3b82f6"/>
    <rect x="-10" y="190" width="30" height="3" rx="1.5" fill="#64748b"/>
    <rect x="-10" y="197" width="32" height="3" rx="1.5" fill="#64748b"/>
    <rect x="-10" y="204" width="28" height="3" rx="1.5" fill="#64748b"/>
    <rect x="-10" y="211" width="25" height="3" rx="1.5" fill="#64748b"/>
    <!-- Checkmark -->
    <path d="M -5 225 L 5 235 L 20 215" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Character 3 - Professional (center-right, smaller, in background) -->
  <g transform="translate(880, 520) scale(0.7)">
    <!-- Body -->
    <ellipse cx="50" cy="120" rx="45" ry="60" fill="#3b82f6"/>
    <!-- Head -->
    <circle cx="50" cy="65" r="30" fill="#fcd9b5"/>
    <!-- Hair -->
    <path d="M 25 60 Q 22 45 35 32 Q 50 25 65 32 Q 78 45 75 60 Q 72 75 50 70 Q 28 75 25 60" fill="#1a1a2e"/>
    <!-- Face -->
    <circle cx="43" cy="62" r="2.5" fill="#4a3728"/>
    <circle cx="57" cy="62" r="2.5" fill="#4a3728"/>
    <path d="M 48 75 Q 50 78 52 75" stroke="#d48876" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Arm raised -->
    <path d="M 75 100 Q 95 90 105 75" stroke="#fcd9b5" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Floating UI Elements / Cards -->
  <!-- Card 1 - User Profile -->
  <g transform="translate(50, 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="140" rx="12" fill="#ffffff"/>
    <rect x="0" y="0" width="180" height="50" rx="12" fill="url(#primaryGradient)"/>
    <circle cx="90" cy="50" r="30" fill="#ffffff"/>
    <circle cx="90" cy="45" r="12" fill="#fcd9b5"/>
    <path d="M 75 65 Q 90 75 105 65" stroke="#fcd9b5" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="30" y="95" width="120" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="45" y="110" width="90" height="6" rx="3" fill="#f1f5f9"/>
    <circle cx="155" cy="25" r="10" fill="#ffffff" opacity="0.3"/>
    <path d="M 155 20 L 155 30 M 150 25 L 160 25" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Card 2 - Analytics -->
  <g transform="translate(970, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="170" height="130" rx="12" fill="#ffffff"/>
    <rect x="20" y="20" width="80" height="10" rx="5" fill="#64748b"/>
    <circle cx="130" cy="35" r="12" fill="#dbeafe"/>
    <path d="M 130 28 L 130 42 M 123 35 L 137 35" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Mini chart -->
    <g transform="translate(20, 55)">
      <rect x="0" y="30" width="15" height="40" rx="3" fill="url(#chartGradient1)"/>
      <rect x="20" y="15" width="15" height="55" rx="3" fill="url(#chartGradient2)"/>
      <rect x="40" y="40" width="15" height="30" rx="3" fill="url(#chartGradient3)"/>
      <rect x="60" y="25" width="15" height="45" rx="3" fill="url(#chartGradient1)"/>
      <rect x="80" y="10" width="15" height="60" rx="3" fill="url(#primaryGradient)"/>
    </g>
    <text x="95" y="115" font-family="Arial" font-size="18" font-weight="bold" fill="#1e40af">+24%</text>
  </g>
  
  <!-- Card 3 - Team Collaboration -->
  <g transform="translate(100, 580)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="100" rx="12" fill="#ffffff"/>
    <circle cx="50" cy="50" r="25" fill="#dbeafe"/>
    <circle cx="50" cy="45" r="10" fill="#fcd9b5"/>
    <path d="M 42 58 Q 50 63 58 58" stroke="#d48876" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="90" cy="55" r="18" fill="#e0f2fe"/>
    <circle cx="90" cy="52" r="7" fill="#8d6e5a"/>
    <path d="M 84 62 Q 90 66 96 62" stroke="#6d5344" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="130" cy="50" r="20" fill="#f0f9ff"/>
    <circle cx="130" cy="46" r="8" fill="#fcd9b5"/>
    <path d="M 124 57 Q 130 61 136 57" stroke="#d48876" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="35" y="80" width="130" height="6" rx="3" fill="#e2e8f0"/>
  </g>
  
  <!-- Connection lines between elements (subtle) -->
  <path d="M 230 220 Q 280 280 350 300" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4" opacity="0.4" fill="none"/>
  <path d="M 970 250 Q 920 320 850 350" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4" opacity="0.4" fill="none"/>
  
  <!-- Icon badges floating -->
  <g transform="translate(280, 580)">
    <circle cx="30" cy="30" r="30" fill="#ffffff" filter="url(#shadow)"/>
    <circle cx="30" cy="30" r="20" fill="#dbeafe"/>
    <path d="M 30 18 L 30 42 M 18 30 L 42 30" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(850, 600)">
    <circle cx="30" cy="30" r="30" fill="#ffffff" filter="url(#shadow)"/>
    <circle cx="30" cy="30" r="20" fill="#dcfce7"/>
    <path d="M 22 30 L 28 36 L 38 24" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Decorative dots pattern -->
  <g fill="#3b82f6" opacity="0.3">
    <circle cx="200" cy="50" r="3"/>
    <circle cx="220" cy="50" r="3"/>
    <circle cx="240" cy="50" r="3"/>
    <circle cx="960" cy="80" r="3"/>
    <circle cx="980" cy="80" r="3"/>
    <circle cx="1000" cy="80" r="3"/>
  </g>
</svg>
